databases:
  - name: launchpilot-db
    plan: free
    databaseName: launchpilot
    user: launchpilot

services:
  - type: web
    name: launchpilot-api
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./apps/api/Dockerfile
    autoDeploy: true
    healthCheckPath: /v1/health
    envVars:
      - key: PORT
        value: "8000"
      - key: AUTH_MODE
        value: dev
      - key: WEB_APP_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: BACKBOARD_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: noreply@growthlaunchpad.app
      - key: BACKBOARD_BASE_URL
        value: https://app.backboard.io/api
      - key: BACKBOARD_LLM_PROVIDER
        value: openai
      - key: BACKBOARD_MODEL_NAME
        value: gpt-4o
      - key: BACKBOARD_MEMORY_MODE
        value: On
      - key: AUTH0_ISSUER
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: APP_JWT_NAMESPACE
        value: https://growthlaunchpad.app
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_M2M_CLIENT_ID
        sync: false
      - key: AUTH0_M2M_CLIENT_SECRET
        sync: false
      - key: AUTH0_MANAGEMENT_AUDIENCE
        sync: false
