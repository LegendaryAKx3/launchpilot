services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  migrate:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command: sh -c "pip install -r requirements.txt && alembic upgrade head"
    volumes:
      - ../../:/workspace
    env_file:
      - ../../.env
    environment:
      SUPABASE_DB_URL: postgresql+psycopg://postgres:postgres@db:5432/postgres
    depends_on:
      db:
        condition: service_healthy

  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ../../:/workspace
    env_file:
      - ../../.env
    environment:
      SUPABASE_DB_URL: postgresql+psycopg://postgres:postgres@db:5432/postgres
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
